<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競争遠征計算機</title>

<style>
body{
font-family:Arial;
background:#1b1b1b;
color:white;
padding:30px;
}

input{
padding:8px;
margin:5px;
font-size:16px;
width:220px;
}

button{
padding:10px 20px;
font-size:16px;
background:#ff9900;
border:none;
cursor:pointer;
}

.box{
margin-top:30px;
padding:20px;
background:#2b2b2b;
}

h2{
margin-top:0;
}
</style>

</head>

<body>

<h2>🚀 競争遠征の速度計算機</h2>

<div class="box">
<h3>速度計算</h3>
派遣戦力 (例: 242.4T / 560B / 48.3M)<br>
<input id="power"><br>

物資 (aa)<br>
<input id="supply" type="number"><br><br>

<button onclick="calc()">速度計算</button>

<h3 id="result"></h3>
</div>

<div class="box">
<h3>⚡ 最大速度(2191km/s)に必要な物資計算</h3>
派遣戦力 (例: 242.4T / 560B)<br>
<input id="power2"><br><br>

<button onclick="maxcalc()">必要物資を計算</button>

<h3 id="maxresult"></h3>
</div>

<script>

// 単位自動変換
function parsePower(input){
    input=input.trim().toLowerCase();
    let num=parseFloat(input);
    if(input.includes("bb")) return num*1e15;
    if(input.includes("aa")) return num*1e12;
    if(input.includes("t")) return num*1e9;
    if(input.includes("b")) return num*1e6;
    if(input.includes("m")) return num;
    if(input.includes("k")) return num/1000;
    return num;
}

// 速度計算
function calc(){
    let power=parsePower(document.getElementById("power").value);
    let supply=parseFloat(document.getElementById("supply").value);

    if(isNaN(power) || isNaN(supply)){
        document.getElementById("result").innerHTML="値を正しく入力してください。";
        return;
    }

    let bonus=100000000*(1-Math.exp(-supply/21));
    let converted=power*(1+bonus/100);
    let speed=100*Math.log(converted)+120;
    if(speed>2191){speed=2191;}

    document.getElementById("result").innerHTML=
    "物資加算: "+bonus.toFixed(0)+" %<br>"+
    "換算戦力: "+converted.toLocaleString()+" M<br>"+
    "速度: "+speed.toFixed(0)+" km/s";
}

// MAX速度 必要物資計算
function maxcalc(){
    let power=parsePower(document.getElementById("power2").value);

    if(isNaN(power)){
        document.getElementById("maxresult").innerHTML="値を正しく入力してください。";
        return;
    }

    let requiredConverted=Math.exp((2191-120)/100); // MAX速度基準の換算戦力

    // 現在の戦力だけで到達可能か
    if(power >= requiredConverted){
        document.getElementById("maxresult").innerHTML =
        "この戦力だけで最大速度に到達しています (必要物資: 0.0000 aa)";
        return;
    }

    // 必要加算値
    let neededBonus = 100*((requiredConverted/power)-1);

    // 必要加算値が1億%超える場合は不可能
    if(neededBonus >= 100000000){
        document.getElementById("maxresult").innerHTML=
        "⚠ この戦力では最大速度に到達できません";
        return;
    }

    // 必要物資逆算
    let supply = -21*Math.log(1-(neededBonus/100000000));

    document.getElementById("maxresult").innerHTML=
    "必要加算％: "+neededBonus.toFixed(0)+" %<br>"+
    "必要物資: "+supply.toFixed(4)+" aa"; // 소수점 4자리 표시
}

</script>

</body>
</html>
