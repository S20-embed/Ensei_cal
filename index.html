<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競争遠征計算機_260316_1500</title>

<style>
body{
font-family:Arial;
background:#1b1b1b;
color:white;
padding:30px;
}

input{
padding:8px;
margin:5px;
font-size:16px;
width:220px;
}

button{
padding:10px 20px;
font-size:16px;
background:#ff9900;
border:none;
cursor:pointer;
}

.box{
margin-top:30px;
padding:20px;
background:#2b2b2b;
}

h2{
margin-top:0;
}
</style>

</head>

<body>

<h2>🚀 競争遠征の速度計算機</h2>

<div class="box">
<h3>速度計算</h3>

派遣戦力 (例: 242.4M / 16.6B / 1.2T)<br>
<input id="power"><br>

物資 (aa)<br>
<input id="supply" type="number"><br><br>

<button onclick="calc()">速度計算</button>

<h3 id="result"></h3>
</div>

<div class="box">
<h3>⚡ 最大速度(2191km/s)に必要な物資</h3>

派遣戦力 (例: 242.4M / 16.6B / 1.2T)<br>
<input id="power2"><br><br>

<button onclick="maxcalc()">必要物資を計算</button>

<h3 id="maxresult"></h3>
</div>

<script>

// 단위 변환
function parsePower(input){

    input=input.trim().toLowerCase();

    let num=parseFloat(input);

    if(input.includes("t")) return num*1000000;
    if(input.includes("b")) return num*1000;
    if(input.includes("m")) return num;

    return num;
}


// 속도 계산
function calc(){

    let power=parsePower(document.getElementById("power").value);
    let supply=parseFloat(document.getElementById("supply").value);

    if(isNaN(power) || isNaN(supply)){
        document.getElementById("result").innerHTML="値を正しく入力してください。";
        return;
    }

    // 물자가산
    let bonus=100000000*(1-Math.exp(-supply/21));

    // 환산전력 (M)
    let converted=power*(1+bonus/100);

    // 속도 계산
    let speed=100*Math.log(converted)+120;

    if(speed>2191){speed=2191;}

    document.getElementById("result").innerHTML=
    "物資加算: "+bonus.toFixed(0)+" %<br>"+
    "換算戦力: "+converted.toLocaleString()+" M<br>"+
    "速度: "+speed.toFixed(0)+" km/s";
}


// 최대속도 필요 물자 계산
function maxcalc(){

    let power=parsePower(document.getElementById("power2").value);

    if(isNaN(power)){
        document.getElementById("maxresult").innerHTML="値を正しく入力してください。";
        return;
    }

    // 100aa 넣었을 때 속도 확인
    let bonusMax = 100000000*(1-Math.exp(-100/21));
    let convertedMax = power*(1+bonusMax/100);
    let speedMax = 100*Math.log(convertedMax)+120;

    if(speedMax < 2191){
        document.getElementById("maxresult").innerHTML =
        "⚠ この戦力では最大速度に到達できません (100aaでも不足)";
        return;
    }

    let low=0;
    let high=100;
    let supply=0;

    for(let i=0;i<100;i++){

        supply=(low+high)/2;

        let bonus=100000000*(1-Math.exp(-supply/21));
        let converted=power*(1+bonus/100);
        let speed=100*Math.log(converted)+120;

        if(speed>=2191){
            high=supply;
        }else{
            low=supply;
        }

    }

    document.getElementById("maxresult").innerHTML=
    "必要物資: "+supply.toFixed(4)+" aa";
}

</script>

</body>
</html>
